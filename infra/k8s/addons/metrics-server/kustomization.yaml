apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Metrics Server installation for local kind-based demonstrations.
# Source pinned to a tagged release for reproducibility.

resources:
  - https://github.com/kubernetes-sigs/metrics-server/releases/download/v0.8.0/components.yaml

patches:
  - target:
      kind: Deployment
      name: metrics-server
      namespace: kube-system
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/args
        value:
          - --cert-dir=/tmp
          - --secure-port=10250
          - --kubelet-preferred-address-types=InternalIP,Hostname,InternalDNS
          - --kubelet-use-node-status-port
          - --metric-resolution=15s
          - --kubelet-insecure-tls
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 200Mi
            ephemeral-storage: 64Mi
          limits:
            cpu: 250m
            memory: 300Mi
            ephemeral-storage: 256Mi
      - op: add
        path: /spec/template/spec/securityContext
        value:
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      - op: add
        path: /spec/template/spec/containers/0/securityContext
        value:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
