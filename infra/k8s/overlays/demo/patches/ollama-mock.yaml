apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
spec:
  template:
    spec:
      containers:
        - name: ollama
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - |
              cat >/tmp/mock_ollama.py <<'PY'
              import json
              from http.server import BaseHTTPRequestHandler, HTTPServer

              class Handler(BaseHTTPRequestHandler):
                  def _write(self, status, payload):
                      body = json.dumps(payload).encode()
                      self.send_response(status)
                      self.send_header("Content-Type", "application/json")
                      self.send_header("Content-Length", str(len(body)))
                      self.end_headers()
                      self.wfile.write(body)

                  def do_GET(self):
                      if self.path == "/api/tags":
                          self._write(200, {"models": [{"name": "mock-ollama:latest"}]})
                      else:
                          self._write(404, {"error": "not found"})

                  def do_POST(self):
                      if self.path in {"/api/generate", "/api/chat"}:
                          self._write(200, {"model": "mock-ollama", "response": "Mock response", "done": True})
                      else:
                          self._write(404, {"error": "not found"})

                  def log_message(self, fmt, *args):
                      return

              HTTPServer(("0.0.0.0", 11434), Handler).serve_forever()
              PY
              exec python /tmp/mock_ollama.py
          env:
            - name: OLLAMA_HOST
              value: 0.0.0.0:11434
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 200m
              memory: 128Mi
              ephemeral-storage: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
