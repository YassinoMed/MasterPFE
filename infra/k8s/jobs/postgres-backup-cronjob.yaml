apiVersion: batch/v1
kind: CronJob
metadata:
  name: securerag-postgres-backup
  namespace: securerag-hub
  labels:
    app.kubernetes.io/name: securerag-postgres-backup
    app.kubernetes.io/part-of: securerag-platform
spec:
  schedule: "17 2 * * *"
  suspend: true
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: securerag-postgres-backup
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          serviceAccountName: securerag-backup
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            fsGroup: 70
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: pg-dump
              image: securerag-registry:5000/postgres:17-alpine
              command:
                - sh
                - -c
                - |
                  set -euo pipefail
                  ts="$(date -u +%Y%m%dT%H%M%SZ)"
                  file="/backup/securerag-${PORTAL_WEB_DB_DATABASE}-${ts}.dump"
                  PGPASSWORD="${DB_PASSWORD}" pg_dump \
                    --host="${DB_HOST}" \
                    --port="${DB_PORT}" \
                    --username="${DB_USERNAME}" \
                    --dbname="${PORTAL_WEB_DB_DATABASE}" \
                    --format=custom \
                    --file="${file}"
                  sha256sum "${file}" > "${file}.sha256"
              envFrom:
                - secretRef:
                    name: securerag-database-secrets
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                  ephemeral-storage: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
                  ephemeral-storage: 1Gi
              volumeMounts:
                - name: backup
                  mountPath: /backup
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: securerag-backup-pvc
            - name: tmp
              emptyDir: {}
