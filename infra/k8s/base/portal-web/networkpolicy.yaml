apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: portal-web-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: portal-web
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8080
