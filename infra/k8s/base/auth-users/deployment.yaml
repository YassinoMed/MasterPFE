apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-users
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: auth-users
  template:
    metadata:
      labels:
        app.kubernetes.io/name: auth-users
    spec:
      serviceAccountName: sa-auth-users
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: auth-users
          image: ghcr.io/example/securerag-hub-auth-users:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: securerag-common-config
            - secretRef:
                name: securerag-common-secrets
                optional: true
          env:
            - name: SERVICE_NAME
              value: auth-users
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
