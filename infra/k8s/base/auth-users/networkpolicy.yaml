apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-users-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: auth-users
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: api-gateway
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: llm-orchestrator
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: chatbot-manager
      ports:
        - protocol: TCP
          port: 8080
  egress: []
