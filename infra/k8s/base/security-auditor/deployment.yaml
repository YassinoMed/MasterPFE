apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-auditor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: security-auditor
  template:
    metadata:
      annotations:
        security.securerag.dev/internal-cleartext-scope: cluster-only-networkpolicy
        security.securerag.dev/internal-cleartext-justification: Internal ClusterIP service calls only; egress is restricted by NetworkPolicies.
      labels:
        app.kubernetes.io/name: security-auditor
    spec:
      serviceAccountName: sa-security-auditor
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: security-auditor
          image: ghcr.io/example/securerag-hub-security-auditor:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: securerag-common-config
            - secretRef:
                name: securerag-common-secrets
                optional: true
          env:
            - name: SERVICE_NAME
              value: security-auditor
            - name: INTERNAL_SERVICE_SCHEME
              value: http
            - name: KNOWLEDGE_HUB_URL
              value: $(INTERNAL_SERVICE_SCHEME)://knowledge-hub:8080
            - name: OLLAMA_HOST
              value: $(INTERNAL_SERVICE_SCHEME)://ollama:11434
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 600m
              memory: 512Mi
              ephemeral-storage: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
