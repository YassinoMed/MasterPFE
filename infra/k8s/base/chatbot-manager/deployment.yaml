apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chatbot-manager
  template:
    metadata:
      annotations:
        security.securerag.dev/internal-cleartext-scope: cluster-only-networkpolicy
        security.securerag.dev/internal-cleartext-justification: Internal ClusterIP service calls only; egress is restricted by NetworkPolicies.
      labels:
        app.kubernetes.io/name: chatbot-manager
    spec:
      serviceAccountName: sa-chatbot-manager
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: chatbot-manager
          image: ghcr.io/example/securerag-hub-chatbot-manager:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: securerag-common-config
            - secretRef:
                name: securerag-common-secrets
                optional: true
          env:
            - name: SERVICE_NAME
              value: chatbot-manager
            - name: INTERNAL_SERVICE_SCHEME
              value: http
            - name: AUTH_USERS_URL
              value: $(INTERNAL_SERVICE_SCHEME)://auth-users:8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
