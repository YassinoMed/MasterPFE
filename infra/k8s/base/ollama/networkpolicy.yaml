apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: llm-orchestrator
      ports:
        - protocol: TCP
          port: 11434
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: security-auditor
      ports:
        - protocol: TCP
          port: 11434
  egress: []
