apiVersion: v1
kind: LimitRange
metadata:
  name: securerag-hub-defaults
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 128Mi
        ephemeral-storage: 128Mi
      default:
        cpu: 500m
        memory: 512Mi
        ephemeral-storage: 512Mi
      min:
        cpu: 50m
        memory: 64Mi
        ephemeral-storage: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
        ephemeral-storage: 4Gi
