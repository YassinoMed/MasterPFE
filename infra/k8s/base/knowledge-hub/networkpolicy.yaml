apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: knowledge-hub-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: knowledge-hub
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: llm-orchestrator
      ports:
        - protocol: TCP
          port: 8080
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: security-auditor
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: qdrant
      ports:
        - protocol: TCP
          port: 6333
