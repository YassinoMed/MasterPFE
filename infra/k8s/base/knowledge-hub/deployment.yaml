apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: knowledge-hub
  template:
    metadata:
      annotations:
        security.securerag.dev/internal-cleartext-scope: cluster-only-networkpolicy
        security.securerag.dev/internal-cleartext-justification: Internal ClusterIP service calls only; egress is restricted by NetworkPolicies.
      labels:
        app.kubernetes.io/name: knowledge-hub
    spec:
      serviceAccountName: sa-knowledge-hub
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: knowledge-hub
          image: ghcr.io/example/securerag-hub-knowledge-hub:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: securerag-common-config
            - secretRef:
                name: securerag-common-secrets
                optional: true
          env:
            - name: SERVICE_NAME
              value: knowledge-hub
            - name: INTERNAL_SERVICE_SCHEME
              value: http
            - name: QDRANT_URL
              value: $(INTERNAL_SERVICE_SCHEME)://qdrant:6333
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
