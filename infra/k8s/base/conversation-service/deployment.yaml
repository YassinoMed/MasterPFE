apiVersion: apps/v1
kind: Deployment
metadata:
  name: conversation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: conversation-service
  template:
    metadata:
      annotations:
        security.securerag.dev/internal-cleartext-scope: cluster-only-networkpolicy
        security.securerag.dev/internal-cleartext-justification: Internal ClusterIP service calls only; egress is restricted by NetworkPolicies.
      labels:
        app.kubernetes.io/name: conversation-service
    spec:
      serviceAccountName: sa-conversation-service
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: conversation-service
          image: ghcr.io/example/securerag-hub-conversation-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: securerag-common-config
            - secretRef:
                name: securerag-common-secrets
                optional: true
          env:
            - name: SERVICE_NAME
              value: conversation-service
            - name: INTERNAL_SERVICE_SCHEME
              value: http
            - name: APP_ENV
              value: production
            - name: APP_DEBUG
              value: "false"
            - name: APP_URL
              value: $(INTERNAL_SERVICE_SCHEME)://conversation-service:8000
            - name: DB_CONNECTION
              value: sqlite
            - name: DB_DATABASE
              value: /tmp/securerag-runtime/database/database.sqlite
            - name: SESSION_DRIVER
              value: file
            - name: CACHE_STORE
              value: file
            - name: QUEUE_CONNECTION
              value: sync
            - name: LOG_CHANNEL
              value: stderr
            - name: CREATE_DOTENV
              value: "false"
            - name: SECURERAG_AUTHZ_ALLOW_LOCAL
              value: "false"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 18
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
              ephemeral-storage: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
