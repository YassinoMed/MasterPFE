apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: securerag-audit-cleartext-env-values
  annotations:
    policies.kyverno.io/title: Audit clear-text environment URLs
    policies.kyverno.io/category: Network Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Audits Pods that expose literal clear-text HTTP URLs through environment
      variables without an explicit SecureRAG internal-cleartext risk
      acceptance annotation.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: audit-literal-http-env-without-risk-acceptance
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
      validate:
        message: >-
          Literal clear-text HTTP environment URLs require the annotation
          security.securerag.dev/internal-cleartext-scope=cluster-only-networkpolicy.
          Prefer an internal service scheme variable for cluster-only
          traffic and HTTPS for public exposure.
        cel:
          expressions:
            - expression: >-
                (
                  has(object.metadata.annotations) &&
                  'security.securerag.dev/internal-cleartext-scope' in object.metadata.annotations &&
                  object.metadata.annotations['security.securerag.dev/internal-cleartext-scope'] == 'cluster-only-networkpolicy'
                ) ||
                (
                  !object.spec.containers.exists(container,
                    has(container.env) &&
                    container.env.exists(env, has(env.value) && env.value.startsWith('http://'))
                  ) &&
                  (
                    !has(object.spec.initContainers) ||
                    !object.spec.initContainers.exists(container,
                      has(container.env) &&
                      container.env.exists(env, has(env.value) && env.value.startsWith('http://'))
                    )
                  )
                )
              message: >-
                Literal clear-text HTTP environment URLs require the annotation
                security.securerag.dev/internal-cleartext-scope=cluster-only-networkpolicy.
