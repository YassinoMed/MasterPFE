apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: securerag-restrict-image-references
  annotations:
    policies.kyverno.io/title: Restrict SecureRAG image references
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Audits Pods that use mutable latest tags, images without digests, or
      images outside the cluster-reachable registry required by the official
      SecureRAG Laravel runtime. Validation Pods are limited to the pinned
      curlimages/curl helper image family.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: disallow-latest-tags
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
      validate:
        message: Mutable latest tags are not accepted for SecureRAG runtime Pods.
        foreach:
          - list: "request.object.spec.containers[]"
            pattern:
              image: "!*:latest"
          - list: "request.object.spec.initContainers[] || []"
            pattern:
              image: "!*:latest"
    - name: require-immutable-digests-for-official-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
      validate:
        message: Official SecureRAG images must be referenced by immutable sha256 digest.
        foreach:
          - list: "request.object.spec.containers[]"
            deny:
              conditions:
                all:
                  - key: "{{ element.image }}"
                    operator: AnyIn
                    value:
                      - "securerag-registry:5000/securerag-hub-*"
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
          - list: "request.object.spec.initContainers[] || []"
            deny:
              conditions:
                all:
                  - key: "{{ element.image }}"
                    operator: AnyIn
                    value:
                      - "securerag-registry:5000/securerag-hub-*"
                  - key: "{{ contains(element.image, '@sha256:') }}"
                    operator: Equals
                    value: false
    - name: restrict-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
              selector:
                matchExpressions:
                  - key: job-role
                    operator: DoesNotExist
      validate:
        message: Runtime images must come from the cluster-reachable registry securerag-registry:5000.
        foreach:
          - list: "request.object.spec.containers[]"
            anyPattern:
              - image: "securerag-registry:5000/*"
          - list: "request.object.spec.initContainers[] || []"
            anyPattern:
              - image: "securerag-registry:5000/*"
    - name: restrict-validation-helper-image
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
              selector:
                matchLabels:
                  job-role: validation
      validate:
        message: Validation Pods may only use the pinned curlimages/curl helper family.
        foreach:
          - list: "request.object.spec.containers[]"
            pattern:
              image: "curlimages/curl:*"
          - list: "request.object.spec.initContainers[] || []"
            pattern:
              image: "curlimages/curl:*"
