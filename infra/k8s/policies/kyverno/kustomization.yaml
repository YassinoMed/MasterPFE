apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# These policies assume Kyverno is already installed in the target cluster.
# They are kept outside the main application base so the local dev overlay can
# still render and deploy even when the policy engine is not present yet.

resources:
  - audit-cleartext-env-values.yaml
  - require-pod-security.yaml
  - require-workload-controls.yaml
  - restrict-image-references.yaml
  - restrict-service-exposure.yaml
  - restrict-volume-types.yaml
  - verify-cosign-images.yaml
