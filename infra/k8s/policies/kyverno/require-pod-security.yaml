apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: securerag-require-pod-security
  annotations:
    policies.kyverno.io/title: SecureRAG Pod Security Baseline
    policies.kyverno.io/category: Pod Security
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Audits pods in the securerag-hub namespace to ensure a consistent
      minimum security posture without breaking the local demonstration
      environment.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-seccomp-serviceaccount-and-resource-guards
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
      validate:
        message: >-
          Pods in securerag-hub should disable service account token
          automounting, use RuntimeDefault seccomp, disable privilege
          escalation, run as non-root, drop all Linux capabilities, use a
          read-only root filesystem, avoid host namespaces, and declare CPU,
          memory, and ephemeral-storage requests and limits.
        pattern:
          spec:
            =(hostNetwork): false
            =(hostPID): false
            =(hostIPC): false
            automountServiceAccountToken: false
            serviceAccountName: "?*"
            securityContext:
              runAsNonRoot: true
              seccompProfile:
                type: RuntimeDefault
            containers:
              - securityContext:
                  =(privileged): false
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                    ephemeral-storage: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
                    ephemeral-storage: "?*"
    - name: disallow-default-service-account
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
      validate:
        message: Pods must use an explicit least-privilege ServiceAccount, never the default ServiceAccount.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.serviceAccountName || 'default' }}"
                operator: Equals
                value: default
            =(initContainers):
              - securityContext:
                  =(privileged): false
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                      - ALL
                resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                    ephemeral-storage: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
                    ephemeral-storage: "?*"
