apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: securerag-verify-cosign-images
  annotations:
    policies.kyverno.io/title: Verify SecureRAG Images
    policies.kyverno.io/category: Software Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Verifies SecureRAG application images signed with Cosign. The rule is
      intentionally scoped to project-owned images used by the official
      Laravel runtime.
spec:
  validationFailureAction: Audit
  background: false
  webhookTimeoutSeconds: 30
  rules:
    - name: verify-securerag-signed-images
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - securerag-hub
      verifyImages:
        - imageReferences:
            - "securerag-registry:5000/securerag-hub-*"
          required: true
          mutateDigest: false
          verifyDigest: false
          attestors:
            - count: 1
              entries:
                - keys:
                    publicKeys: |-
                      -----BEGIN PUBLIC KEY-----
                      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEGcgrdP3tSi/L/aFyN+bgiAuZmXsu
                      90qp08CJeIPDZLlTC6mvehJmxdZozuw692DnWByovXjlN+wXKq6bfWTZeA==
                      -----END PUBLIC KEY-----
