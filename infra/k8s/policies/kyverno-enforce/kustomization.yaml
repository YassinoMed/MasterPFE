apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Optional Enforce overlay. It only promotes the low-risk image reference
# policies first: no latest tags, trusted cluster registry, digest references,
# and Cosign verifyImages when the release signatures are available.

resources:
  - ../kyverno

patches:
  - target:
      group: kyverno.io
      version: v1
      kind: ClusterPolicy
      name: securerag-verify-cosign-images
    patch: |-
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
      - op: replace
        path: /spec/rules/0/verifyImages/0/verifyDigest
        value: true
  - target:
      group: kyverno.io
      version: v1
      kind: ClusterPolicy
      name: securerag-restrict-image-references
    patch: |-
      - op: replace
        path: /spec/validationFailureAction
        value: Enforce
