apiVersion: v1
kind: ConfigMap
metadata:
  name: securerag-sre-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  securerag-sre-dashboard.json: |-
    {
      "title": "SecureRAG Hub SRE",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "panels": [
        {
          "type": "stat",
          "title": "Ready pods",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"securerag-hub\", condition=\"true\"})",
              "legendFormat": "ready"
            }
          ]
        },
        {
          "type": "stat",
          "title": "CrashLoopBackOff",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_waiting_reason{namespace=\"securerag-hub\", reason=\"CrashLoopBackOff\"})",
              "legendFormat": "crashloops"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HPA current replicas",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 7 },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"securerag-hub\"}",
              "legendFormat": "{{horizontalpodautoscaler}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "CPU usage by pod",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 11 },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"securerag-hub\", container!=\"\"}[5m]))",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ]
    }
