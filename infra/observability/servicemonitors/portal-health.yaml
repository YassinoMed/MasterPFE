apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: securerag-portal-health
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/name: securerag-portal-health
spec:
  namespaceSelector:
    matchNames:
      - securerag-hub
  selector:
    matchLabels:
      app.kubernetes.io/name: portal-web
  endpoints:
    - port: http
      path: /health
      interval: 30s
      scrapeTimeout: 5s
