services:
  portal-web:
    build:
      context: ./portal-web
    container_name: securerag-portal-web
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
    ports:
      - "8082:8000"
    networks:
      - securerag-platform

  gateway:
    image: nginx:1.27-alpine
    container_name: securerag-platform-gateway
    depends_on:
      - portal-web
    ports:
      - "8081:80"
    volumes:
      - ./gateway/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - securerag-platform

networks:
  securerag-platform:
    driver: bridge
