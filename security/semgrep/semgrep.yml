rules:
  - id: python.requests-no-cert-validation
    message: Do not disable TLS certificate verification in HTTP clients.
    severity: ERROR
    languages:
      - python
    metadata:
      category: security
      technology:
        - python
        - requests
        - httpx
    patterns:
      - pattern-either:
          - pattern: requests.$FUNC(..., verify=False, ...)
          - pattern: httpx.$FUNC(..., verify=False, ...)

  - id: python.subprocess-shell-true
    message: Avoid shell=True with untrusted input; prefer argument arrays and explicit allowlists.
    severity: ERROR
    languages:
      - python
    metadata:
      category: security
      cwe:
        - "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
    patterns:
      - pattern-either:
          - pattern: subprocess.run(..., shell=True, ...)
          - pattern: subprocess.Popen(..., shell=True, ...)
          - pattern: subprocess.call(..., shell=True, ...)
          - pattern: subprocess.check_call(..., shell=True, ...)
          - pattern: subprocess.check_output(..., shell=True, ...)

  - id: python.yaml-load-unsafe
    message: Use yaml.safe_load instead of yaml.load or yaml.unsafe_load on untrusted data.
    severity: ERROR
    languages:
      - python
    metadata:
      category: security
      cwe:
        - "CWE-20: Improper Input Validation"
    patterns:
      - pattern-either:
          - pattern: yaml.unsafe_load(...)
          - patterns:
              - pattern: yaml.load(...)
              - pattern-not: yaml.load(..., Loader=yaml.SafeLoader, ...)
              - pattern-not: yaml.load(..., Loader=SafeLoader, ...)

  - id: python.jwt-verification-disabled
    message: JWT signature verification must stay enabled.
    severity: ERROR
    languages:
      - python
    metadata:
      category: security
      cwe:
        - "CWE-347: Improper Verification of Cryptographic Signature"
    patterns:
      - pattern-either:
          - pattern: 'jwt.decode(..., options={"verify_signature": False}, ...)'
          - pattern: 'jose.jwt.decode(..., options={"verify_signature": False}, ...)'

  - id: python.eval-exec
    message: Avoid eval/exec on dynamic content; use safe parsing or explicit dispatch.
    severity: ERROR
    languages:
      - python
    metadata:
      category: security
      cwe:
        - "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)

  - id: python.pickle-deserialization
    message: Avoid pickle deserialization for untrusted data.
    severity: WARNING
    languages:
      - python
    metadata:
      category: security
      cwe:
        - "CWE-502: Deserialization of Untrusted Data"
    pattern-either:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)

  - id: dockerfile-user-root
    message: Container images must not run as root.
    severity: ERROR
    languages:
      - dockerfile
    metadata:
      category: security
      technology:
        - docker
      exception:
        - infra/jenkins/Dockerfile uses root only during image build and switches back to USER jenkins for runtime.
    paths:
      exclude:
        - /infra/jenkins/Dockerfile
    pattern: USER root

  - id: dockerfile-recursive-copy-dot
    message: Avoid recursive `COPY . .`; copy only required application paths and keep sensitive files out of the image context.
    severity: ERROR
    languages:
      - dockerfile
    metadata:
      category: supply-chain
      technology:
        - docker
      cwe:
        - "CWE-200: Exposure of Sensitive Information to an Unauthorized Actor"
    pattern: COPY . .

  - id: kubernetes-cleartext-env-value
    message: Kubernetes manifests must not hardcode literal http:// environment values; use scoped internal scheme expansion with NetworkPolicy justification or HTTPS for public endpoints.
    severity: ERROR
    languages:
      - yaml
    metadata:
      category: network-security
      technology:
        - kubernetes
      cwe:
        - "CWE-319: Cleartext Transmission of Sensitive Information"
    paths:
      include:
        - "/infra/k8s/**/*.yaml"
        - "/infra/k8s/**/*.yml"
    patterns:
      - pattern: |
          - name: $ENV
            value: http://$HOST

  - id: php.laravel-form-request-authorize-true
    message: FormRequest authorization must call a policy, middleware-backed helper, or service token guard instead of returning true.
    severity: ERROR
    languages:
      - php
    metadata:
      category: security
      technology:
        - php
        - laravel
      cwe:
        - "CWE-862: Missing Authorization"
    patterns:
      - pattern: |
          public function authorize(): bool
          {
              return true;
          }

  - id: php.laravel-authz-local-default-open
    message: Local authorization bypass flags must default to false; use an explicit opt-in only for isolated demos.
    severity: ERROR
    languages:
      - php
    metadata:
      category: security
      technology:
        - php
        - laravel
      cwe:
        - "CWE-276: Incorrect Default Permissions"
    pattern-either:
      - pattern: env('SECURERAG_AUTHZ_ALLOW_LOCAL', true)
      - pattern: env("SECURERAG_AUTHZ_ALLOW_LOCAL", true)

  - id: php.laravel-policy-return-true
    message: Laravel policies must not allow sensitive actions with unconditional return true; use an explicit role, owner or permission check.
    severity: ERROR
    languages:
      - php
    metadata:
      category: security
      technology:
        - php
        - laravel
      cwe:
        - "CWE-863: Incorrect Authorization"
    paths:
      include:
        - "/services-laravel/**/app/Policies/*.php"
    patterns:
      - pattern: |
          public function $METHOD(...)
          {
              return true;
          }
      - metavariable-regex:
          metavariable: $METHOD
          regex: "^(create|update|delete|manage|changeStatus|restore|forceDelete)$"

  - id: php.laravel-log-raw-request-payload
    message: Do not log raw request payloads; redact sensitive fields before writing application logs or audit metadata.
    severity: ERROR
    languages:
      - php
    metadata:
      category: security
      technology:
        - php
        - laravel
      cwe:
        - "CWE-532: Insertion of Sensitive Information into Log File"
    patterns:
      - pattern-either:
          - pattern: Log::$LEVEL(..., $REQUEST->all(), ...)
          - pattern: Log::$LEVEL(..., $REQUEST->input(), ...)
          - pattern: logger(..., $REQUEST->all(), ...)
          - pattern: logger(..., $REQUEST->input(), ...)
      - metavariable-regex:
          metavariable: $REQUEST
          regex: .*(request|Request).*

  - id: dockerfile-latest-tag
    message: Avoid mutable latest tags in base images; pin an explicit version or digest.
    severity: WARNING
    languages:
      - dockerfile
    metadata:
      category: supply-chain
      technology:
        - docker
    paths:
      include:
        - "**/Dockerfile"
    pattern-regex: (?m)^FROM\s+\S+:latest(?:\s|$)
