title = "SecureRAG Hub Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
description = "Allow generated reports, documentation samples, and test fixtures with fake credentials."
paths = [
  '''(^|/)\.coverage-artifacts/''',
  '''(^|/)infra/jenkins/secrets/(README\.md|\.gitkeep|[^/]+\.example)$''',
  '''(^|/)security/reports/''',
  '''(^|/)security/adversarial/''',
  '''(^|/)security/secrets/\.env\.example$''',
  '''(^|/)tests/fixtures/''',
  '''(^|/)tests/security/fixtures/'''
]
regexes = [
  '''(?i)example[_-]?(token|secret|key|password)''',
  '''(?i)(dummy|fake|sample|test|changeme|not[-_]?real)[_-]?(token|secret|key|password)?'''
]
