# SecureRAG Hub - SonarQube/SonarCloud analysis configuration
sonar.projectKey=securerag-hub
sonar.projectName=SecureRAG Hub
sonar.sourceEncoding=UTF-8

# Jenkins remains the authoritative CI/CD engine; this file only makes static
# analysis deterministic when Sonar is executed manually or by Jenkins.
# Python source files were removed from the project scope. The explicit Python
# version below prevents stale Sonar warnings if generated dependencies or an
# oversized scanner scope still discover Python files.
sonar.sources=services-laravel,platform,scripts,infra
sonar.tests=\
  services-laravel/auth-users-service/tests,\
  services-laravel/chatbot-manager-service/tests,\
  services-laravel/conversation-service/tests,\
  services-laravel/audit-security-service/tests,\
  platform/portal-web/tests
# Kept explicit to avoid Sonar's default "all Python 3 versions" warning when
# Python files are discovered by the scanner or by future scope changes.
sonar.python.version=3.11

sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/.venv/**,\
  **/.pytest_cache/**,\
  **/*.py,\
  artifacts/**,\
  **/artifacts/**,\
  **/rendered-overlay.yaml,\
  **/*-describe.txt,\
  security/reports/**,\
  **/storage/**,\
  **/bootstrap/cache/**,\
  **/composer.lock

# CPD ignores generated framework skeletons, test fixtures and declarative
# Kubernetes boilerplate while keeping those files available to normal static
# analysis. These exclusions address Sonar duplication noise only; they do not
# remove the files from SAST/security analysis.
sonar.cpd.exclusions=\
  **/config/**,\
  services-laravel/*/config/*.php,\
  platform/portal-web/config/*.php,\
  **/bootstrap/app.php,\
  **/database/migrations/0001_01_01_*.php,\
  services-laravel/*/database/migrations/0001_01_01_*.php,\
  platform/portal-web/database/migrations/0001_01_01_*.php,\
  services-laravel/auth-users-service/database/migrations/2026_04_11_000003_create_permission_role_table.php,\
  services-laravel/auth-users-service/database/migrations/2026_04_11_000004_create_role_user_table.php,\
  **/database/factories/UserFactory.php,\
  services-laravel/*/database/factories/UserFactory.php,\
  platform/portal-web/database/factories/UserFactory.php,\
  **/app/Models/User.php,\
  **/resources/views/welcome.blade.php,\
  **/resources/views/securerag-home.blade.php,\
  **/docker/entrypoint.sh,\
  services-laravel/*/tests/Feature/AuthorizationSecurityTest.php,\
  platform/portal-web/app/Support/DemoPortalData.php,\
  **/composer.json,\
  **/package.json,\
  **/phpunit.xml,\
  scripts/release/lib/common.sh,\
  scripts/release/generate-release-attestation.sh,\
  scripts/deploy/verify-and-deploy-kind.sh,\
  scripts/validate/run-reference-campaign.sh,\
  scripts/validate/run-devsecops-final-proof.sh,\
  scripts/validate/run-missing-phases-closure.sh,\
  infra/k8s/base/**/deployment.yaml,\
  infra/k8s/base/**/service.yaml,\
  infra/k8s/base/**/serviceaccount.yaml

sonar.test.inclusions=\
  services-laravel/**/tests/**/*.php,\
  platform/portal-web/tests/**/*.php

sonar.php.coverage.reportPaths=platform/portal-web/build/logs/clover.xml
sonar.php.tests.reportPath=platform/portal-web/build/logs/junit.xml
