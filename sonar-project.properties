# SecureRAG Hub - SonarQube/SonarCloud analysis configuration
sonar.projectKey=securerag-hub
sonar.projectName=SecureRAG Hub
sonar.sourceEncoding=UTF-8

# Jenkins remains the authoritative CI/CD engine; this file only makes static
# analysis deterministic when Sonar is executed manually or by Jenkins.
# Python demo services are intentionally excluded from Sonar here; they remain
# validated by Jenkins/pytest in the official CI path.
sonar.sources=services-laravel,platform,scripts,infra
sonar.tests=services-laravel,platform/portal-web/tests
sonar.python.version=3.11

sonar.exclusions=\
  **/vendor/**,\
  **/node_modules/**,\
  **/.venv/**,\
  **/.pytest_cache/**,\
  artifacts/**,\
  security/reports/**,\
  **/storage/**,\
  **/bootstrap/cache/**,\
  **/composer.lock

sonar.test.inclusions=\
  services-laravel/**/tests/**/*.php,\
  platform/portal-web/tests/**/*.php

sonar.php.coverage.reportPaths=platform/portal-web/build/logs/clover.xml
sonar.php.tests.reportPath=platform/portal-web/build/logs/junit.xml
