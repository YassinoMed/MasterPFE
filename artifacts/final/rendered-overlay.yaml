apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/part-of: securerag-hub
  name: api-gateway
  namespace: securerag-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
      app.kubernetes.io/part-of: securerag-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: securerag-hub
    spec:
      automountServiceAccountToken: false
      containers:
      - env:
        - name: SERVICE_NAME
          value: api-gateway
        - name: AUTH_USERS_URL
          value: http://auth-users:8080
        - name: CHATBOT_MANAGER_URL
          value: http://chatbot-manager:8080
        - name: LLM_ORCHESTRATOR_URL
          value: http://llm-orchestrator:8080
        - name: SECURITY_AUDITOR_URL
          value: http://security-auditor:8080
        envFrom:
        - configMapRef:
            name: securerag-common-config
        - secretRef:
            name: securerag-common-secrets
            optional: true
        image: localhost:5001/securerag-hub-api-gateway:demo
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        name: api-gateway
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 300m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: sa-api-gateway
      volumes:
      - emptyDir: {}
        name: tmp
