---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  labels:
    app.kubernetes.io/part-of: securerag-hub
  name: securerag-runtime-readonly
  namespace: securerag-hub
rules:
- apiGroups:
  - ""
  resources:
  - pods
  - services
  - endpoints
  - events
  - configmaps
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - apps
  resources:
  - deployments
  - replicasets
  - statefulsets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - policy
  resources:
  - poddisruptionbudgets
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  labels:
    app.kubernetes.io/part-of: securerag-hub
  name: securerag-runtime-readonly-audit-security-service
  namespace: securerag-hub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: securerag-runtime-readonly
subjects:
- kind: ServiceAccount
  name: sa-audit-security-service
  namespace: securerag-hub
---
apiVersion: v1
data:
  APP_ENV: demo
  BCRYPT_ROUNDS: "12"
  LOG_LEVEL: info
  REQUEST_TIMEOUT_SECONDS: "10"
  SECURERAG_AUDIT_HASH_CHAIN: "true"
  SECURERAG_REDACT_LOGS: "true"
  SESSION_LIFETIME: "120"
