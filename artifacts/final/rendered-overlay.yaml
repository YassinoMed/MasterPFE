apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/part-of: securerag-hub
  name: ollama
  namespace: securerag-hub
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ollama
      app.kubernetes.io/part-of: securerag-hub
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ollama
        app.kubernetes.io/part-of: securerag-hub
    spec:
      automountServiceAccountToken: false
      containers:
      - args:
        - |
          cat >/tmp/mock_ollama.py <<'PY'
          import json
          from http.server import BaseHTTPRequestHandler, HTTPServer

          class Handler(BaseHTTPRequestHandler):
              def _write(self, status, payload):
                  body = json.dumps(payload).encode()
                  self.send_response(status)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def do_GET(self):
                  if self.path == "/api/tags":
                      self._write(200, {"models": [{"name": "mock-ollama:latest"}]})
                  else:
                      self._write(404, {"error": "not found"})

              def do_POST(self):
                  if self.path in {"/api/generate", "/api/chat"}:
                      self._write(200, {"model": "mock-ollama", "response": "Mock response", "done": True})
                  else:
                      self._write(404, {"error": "not found"})

              def log_message(self, fmt, *args):
                  return

          HTTPServer(("0.0.0.0", 11434), Handler).serve_forever()
          PY
          exec python /tmp/mock_ollama.py
        command:
        - sh
        - -c
        env:
        - name: OLLAMA_HOST
          value: 0.0.0.0:11434
        image: python:3.12-alpine
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /api/tags
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 3
        name: ollama
        ports:
        - containerPort: 11434
          name: http
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /api/tags
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /api/tags
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
        volumeMounts:
        - mountPath: /root/.ollama
          name: ollama-models
        - mountPath: /tmp
          name: tmp
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: sa-ollama
      volumes:
      - emptyDir: {}
        name: ollama-models
        persistentVolumeClaim:
          claimName: ollama-models
      - emptyDir: {}
        name: tmp
---
