apiVersion: v1
kind: LimitRange
metadata:
  labels:
    app.kubernetes.io/part-of: securerag-hub
  name: securerag-hub-defaults
  namespace: securerag-hub
spec:
  limits:
  - default:
      cpu: 500m
      ephemeral-storage: 512Mi
      memory: 512Mi
    defaultRequest:
      cpu: 100m
      ephemeral-storage: 128Mi
      memory: 128Mi
    max:
      cpu: "2"
      ephemeral-storage: 4Gi
      memory: 2Gi
    min:
      cpu: 50m
      ephemeral-storage: 64Mi
      memory: 64Mi
    type: Container
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/part-of: securerag-hub
  name: audit-security-service
  namespace: securerag-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: audit-security-service
      app.kubernetes.io/part-of: securerag-hub
  template:
    metadata:
      annotations:
        security.securerag.dev/internal-cleartext-justification: Internal ClusterIP
          service calls only; egress is restricted by NetworkPolicies.
        security.securerag.dev/internal-cleartext-scope: cluster-only-networkpolicy
      labels:
        app.kubernetes.io/name: audit-security-service
        app.kubernetes.io/part-of: securerag-hub
    spec:
      automountServiceAccountToken: false
      containers:
      - env:
        - name: SERVICE_NAME
          value: audit-security-service
        - name: INTERNAL_SERVICE_SCHEME
          value: http
        - name: APP_ENV
          value: production
        - name: APP_DEBUG
          value: "false"
        - name: APP_URL
          value: $(INTERNAL_SERVICE_SCHEME)://audit-security-service:8000
        - name: DB_CONNECTION
          value: sqlite
        - name: DB_DATABASE
          value: /tmp/securerag-runtime/database/database.sqlite
        - name: SESSION_DRIVER
          value: file
        - name: CACHE_STORE
          value: file
        - name: QUEUE_CONNECTION
          value: sync
        - name: LOG_CHANNEL
          value: stderr
        - name: CREATE_DOTENV
          value: "false"
        - name: SECURERAG_AUTHZ_ALLOW_LOCAL
          value: "false"
        envFrom:
        - configMapRef:
            name: securerag-common-config
        - secretRef:
            name: securerag-common-secrets
            optional: true
        image: localhost:5001/securerag-hub-audit-security-service:demo
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 3
        name: audit-security-service
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        resources:
          limits:
            cpu: 300m
            ephemeral-storage: 512Mi
            memory: 384Mi
          requests:
            cpu: 100m
            ephemeral-storage: 128Mi
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        startupProbe:
          failureThreshold: 18
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      securityContext:
        fsGroup: 10001
        runAsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: sa-audit-security-service
      volumes:
      - emptyDir: {}
        name: tmp
---
