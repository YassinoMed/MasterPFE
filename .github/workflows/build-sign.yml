# Deprecated: Jenkins is the authoritative CI/CD engine for SecureRAG Hub.
name: legacy-build-sign

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: build-sign-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-publish-sign:
    name: Build, publish, scan, SBOM, sign
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-users
          - chatbot-manager
          - llm-orchestrator
          - security-auditor
          - knowledge-hub

    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository_owner }}/securerag-hub

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Prepare build directories
        run: mkdir -p security/reports

      - name: Check service Dockerfile
        id: service_check
        run: |
          if [ -f "./services/${{ matrix.service }}/Dockerfile" ]; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Skipping ${{ matrix.service }} because Dockerfile is not present yet."
          fi

      - name: Log in to GHCR
        if: steps.service_check.outputs.exists == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        if: steps.service_check.outputs.exists == 'true'
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.service }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Set up Docker Buildx
        if: steps.service_check.outputs.exists == 'true'
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build and push image
        if: steps.service_check.outputs.exists == 'true'
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        if: steps.service_check.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: image
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: json
          output: security/reports/${{ matrix.service }}-trivy-image.json
          ignorefile: .trivyignore
          trivy-config: security/trivy/trivy.yaml
          version: v0.69.3

      - name: Generate SBOM from pushed image
        if: steps.service_check.outputs.exists == 'true'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}
          format: cyclonedx-json
          output-file: security/reports/${{ matrix.service }}-sbom.cdx.json

      - name: Install Cosign
        if: steps.service_check.outputs.exists == 'true'
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003
        with:
          cosign-release: v3.0.5

      - name: Sign image with Cosign keyless
        if: steps.service_check.outputs.exists == 'true'
        run: |
          cosign sign --yes \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}"

      - name: Verify Cosign signature
        if: steps.service_check.outputs.exists == 'true'
        run: |
          cosign verify \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            --certificate-identity-regexp "^https://github.com/${{ github.repository }}/.github/workflows/build-sign.yml@refs/(heads/main|tags/.+)$" \
            "${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}@${{ steps.build.outputs.digest }}" \
            > "security/reports/${{ matrix.service }}-cosign-verify.json"

      - name: Persist build metadata
        if: steps.service_check.outputs.exists == 'true'
        run: |
          cat <<EOF > "security/reports/${{ matrix.service }}-image.txt"
          image=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}-${{ matrix.service }}
          digest=${{ steps.build.outputs.digest }}
          git_sha=${{ github.sha }}
          tags=${{ steps.meta.outputs.tags }}
          EOF

      - name: Upload release artifacts
        if: always() && steps.service_check.outputs.exists == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: build-sign-${{ matrix.service }}
          path: |
            security/reports/${{ matrix.service }}-trivy-image.json
            security/reports/${{ matrix.service }}-sbom.cdx.json
            security/reports/${{ matrix.service }}-cosign-verify.json
            security/reports/${{ matrix.service }}-image.txt
          if-no-files-found: warn
