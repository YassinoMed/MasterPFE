name: ci-pr

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - "docs/**"
      - "**/*.md"

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quality-security:
    name: Quality, tests, SAST, secrets, fs-scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PYTHON_VERSION: "3.11"
      COVERAGE_MIN: "70"
      SEMGREP_VERSION: "1.156.0"
      GITLEAKS_IMAGE: "ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f"

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements*.txt
            services/**/requirements*.txt

      - name: Prepare report directories
        run: |
          mkdir -p security/reports
          mkdir -p .coverage-artifacts

      - name: Install CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff "semgrep==${SEMGREP_VERSION}"

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -d services ]; then
            while IFS= read -r requirements_file; do
              pip install -r "${requirements_file}"
            done < <(find services -maxdepth 2 -type f -name "requirements*.txt" | sort)
          fi

      - name: Lint
        run: |
          if find services tests -type f -name "*.py" 2>/dev/null | grep -q .; then
            ruff check services tests
          else
            echo "No Python files found yet."
          fi

      - name: Unit and integration tests
        run: |
          bash scripts/ci/run-tests.sh

      - name: Collect coverage
        run: |
          bash scripts/ci/collect-coverage.sh

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config security/semgrep/semgrep.yml \
            --json \
            --output security/reports/semgrep.json \
            --error

      - name: Gitleaks scan
        run: |
          docker run --rm \
            -v "${PWD}:/repo" \
            -w /repo \
            "${GITLEAKS_IMAGE}" \
            dir /repo \
            --config .gitleaks.toml \
            --report-format json \
            --report-path security/reports/gitleaks.json \
            --no-banner

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: security/reports/trivy-fs.json
          ignorefile: .trivyignore
          trivy-config: security/trivy/trivy.yaml
          version: v0.69.3

      - name: Upload CI artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ci-pr-artifacts
          path: |
            security/reports/
            .coverage-artifacts/
          if-no-files-found: warn
